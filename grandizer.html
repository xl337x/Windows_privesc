function copyToClipboard(text,btn){
  navigator.clipboard.writeText(text).then(function(){
    if(btn){var o=btn.textContent;btn.textContent='\u2713 Copied';btn.style.color='var(--success)';setTimeout(function(){btn.textContent=o;btn.style.color='';},1200);}
    showToast('Copied to clipboard','success');
  }).catch(function(){
    var ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    showToast('Copied','success');
  });
}

function showToast(msg,type){
  var t=document.createElement('div');t.className='toast toast-'+(type||'info');t.textContent=msg;
  var c=document.getElementById('toastContainer');c.appendChild(t);
  setTimeout(function(){t.style.opacity='0';t.style.transform='translateX(40px)';setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t);},200);},CONFIG.toastDuration);
}

function switchTab(tabId){
  var cur=document.getElementById('pane-'+STATE.activeTab);
  if(cur)STATE.scrollPos[STATE.activeTab]=cur.scrollTop;
  STATE.activeTab=tabId;
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.toggle('active',b.dataset.tab===tabId);});
  document.querySelectorAll('.tab-pane').forEach(function(p){p.classList.toggle('active',p.id==='pane-'+tabId);});
  var np=document.getElementById('pane-'+tabId);
  if(np&&STATE.scrollPos[tabId])np.scrollTop=STATE.scrollPos[tabId];
  saveState();
}

function updateTimer(){
  var elapsed=Math.floor((Date.now()-STATE.timerStart)/1000);
  var h=Math.floor(elapsed/3600),m=Math.floor((elapsed%3600)/60),s=elapsed%60;
  document.getElementById('footerTimer').textContent=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

function saveState(){
  try{localStorage.setItem(CONFIG.storageKey,JSON.stringify({
    activeTab:STATE.activeTab,wizardPath:STATE.wizardPath,wizardStage:STATE.wizardStage,
    failedPaths:Array.from(STATE.failedPaths),completedPaths:Array.from(STATE.completedPaths),
    timerStart:STATE.timerStart
  }));}catch(e){}
}

function loadState(){
  try{
    var d=JSON.parse(localStorage.getItem(CONFIG.storageKey));
    if(d){
      if(d.activeTab)STATE.activeTab=d.activeTab;
      if(d.wizardPath)STATE.wizardPath=d.wizardPath;
      if(d.wizardStage!==undefined)STATE.wizardStage=d.wizardStage;
      if(d.failedPaths)STATE.failedPaths=new Set(d.failedPaths);
      if(d.completedPaths)STATE.completedPaths=new Set(d.completedPaths);
      if(d.timerStart)STATE.timerStart=d.timerStart;
    }
  }catch(e){}
}

  });
  document.getElementById('pane-quickwins').innerHTML=html;
}

function runQuickWinParse(rank,text){
  var qw=QUICK_WINS.find(function(q){return q.rank===rank;});
  if(!qw)return;
  var el=document.getElementById('qw-result-'+rank);
  if(!text||!text.trim()){el.className='qw-result red';el.style.display='block';el.textContent='\u274c No output \u2014 command may have failed or returned empty';return;}
  if(qw.successPattern&&qw.successPattern.test(text)){
    el.className='qw-result green';el.style.display='block';el.innerHTML='\u2705 EXPLOITABLE \u2014 <strong>'+escHtml(qw.name)+'</strong> detected! Click "Open in Wizard" to exploit.';
  } else if(/error|denied|not found|cannot/i.test(text)){
    el.className='qw-result red';el.style.display='block';el.textContent='\u274c NOT VULNERABLE \u2014 No match found in output.';
  } else {
    el.className='qw-result yellow';el.style.display='block';el.textContent='\u26a0\ufe0f INVESTIGATE \u2014 Output unclear. Review manually and check wizard for details.';
  }
}

function initTriage(){
  var html='<h2 style="margin-bottom:4px">\ud83d\udd0d Triage Engine</h2><p class="text-sm text-muted mb-12">Run the collector on target, paste ALL output below, then click Analyze.</p>';
  html+='<div class="card mb-12"><div class="card-title mb-8">PowerShell Triage Collector v3 (paste directly into PS prompt)</div><div class="cmd-block" style="max-height:200px;overflow-y:auto"><button class="copy-btn" data-cmd="'+escAttr(TRIAGE_PS_CMD)+'">Copy</button>'+escHtml(TRIAGE_PS_CMD)+'</div>';
  html+='<div class="card-title mt-8 mb-8">CMD Alternative</div><div class="cmd-block"><button class="copy-btn" data-cmd="'+escAttr(TRIAGE_CMD_CMD)+'">Copy</button>'+escHtml(TRIAGE_CMD_CMD)+'</div></div>';
  html+='<div class="form-group"><label>Paste ALL enumeration output here:</label><textarea id="triageInput" rows="10" placeholder="Paste whoami /all, systeminfo, services, etc..."></textarea></div>';
  html+='<button class="btn btn-accent" id="triageAnalyzeBtn">\ud83d\udd0d Analyze Output</button>';
  html+='<div id="triageResults" class="mt-16"></div>';
  document.getElementById('pane-triage').innerHTML=html;
}

function runTriage(){
  var input=document.getElementById('triageInput').value;
  if(!input.trim()){showToast('Paste enumeration output first','error');return;}
  var results=[];
  Object.keys(DETECTORS).forEach(function(key){
    if(DETECTORS[key].test(input)){
      var meta=DETECTOR_META[key]||{title:key,sev:'low',wizardKey:null,time:'?',desc:'',confirmOneLiner:''};
      results.push({key:key,priority:PRIORITY[key]||0,meta:meta});
    }
  });
  results.sort(function(a,b){return b.priority-a.priority;});
  STATE.triageResults=results;
  renderTriageResults(results);
}

function renderTriageResults(results){
  var el=document.getElementById('triageResults');
  if(!results.length){el.innerHTML='<div class="card"><p class="text-muted">No vectors detected. Try pasting more enumeration output (whoami /all, systeminfo, services, etc.)</p></div>';return;}
  var html='<h3 class="mb-8">Detected '+results.length+' potential vector'+(results.length>1?'s':'')+':</h3>';
  results.forEach(function(r){
    var sc=r.priority>=85?'crit':r.priority>=70?'high':r.priority>=50?'med':'low';
    html+='<div class="triage-card">';
    html+='<div class="triage-score '+sc+'">'+r.priority+'</div>';
    html+='<div class="triage-body">';
    html+='<div class="card-title">'+escHtml(r.meta.title)+'</div>';
    html+='<div class="text-xs text-muted mb-8">'+escHtml(r.meta.desc)+' \u2014 \u23f1 '+escHtml(r.meta.time)+'</div>';
    if(r.meta.confirmOneLiner){
      html+='<div class="cmd-block" style="font-size:11px"><button class="copy-btn" data-cmd="'+escAttr(r.meta.confirmOneLiner)+'">Copy</button>'+escHtml(r.meta.confirmOneLiner)+'</div>';
    }
    if(r.meta.wizardKey&&WIZARD_PATHS[r.meta.wizardKey]){
      html+='<button class="btn btn-sm btn-accent mt-8 triage-wizard-btn" data-key="'+escAttr(r.meta.wizardKey)+'">\ud83d\ude80 Start Wizard: '+escHtml(r.meta.wizardKey)+'</button>';
    }
    html+='</div></div>';
  });
  el.innerHTML=html;
}

function loadWizardPath(key){

}

function renderWizardStage(){
  var path=WIZARD_PATHS[STATE.wizardPath];
  if(!path){return;}
  var stage=path.stages[STATE.wizardStage]||path.stages[0];
  var html='<div class="card-header flex-wrap">';
  html+='<h2 class="card-title">'+escHtml(path.title)+'</h2>';
  path.badges.forEach(function(b){html+='<span class="badge '+escAttr(b.cls)+'">'+escHtml(b.text)+'</span>';});
  html+='</div>';
  html+='<div class="text-sm text-muted mb-8">\u23f1 '+escHtml(path.timeEstimate)+'</div>';
  // Confirm one-liner
  html+='<div class="card mb-12"><div class="text-xs text-muted mb-8">ONE-LINER CONFIRM TEST:</div><div class="cmd-block"><button class="copy-btn" data-cmd="'+escAttr(path.confirmOneLiner)+'">Copy</button>'+escHtml(path.confirmOneLiner)+'</div></div>';
  // Rabbit hole warning
  html+='<div class="rabbit-warning">\ud83d\udc07 RABBIT HOLE WARNING: '+escHtml(path.rabbitHoleWarning)+'</div>';
  // Stage nav
  html+='<div class="stage-nav">';
  path.stages.forEach(function(s,i){
    var cls='stage-pill'+(i===STATE.wizardStage?' active':'')+(s.isKaliSide?' kali':'');
    html+='<div class="'+cls+'" data-stage="'+i+'">'+(s.isKaliSide?'\ud83d\udda5\ufe0f ':'')+escHtml(s.title)+'</div>';
  });
  html+='</div>';
  // Stage content
  html+='<div class="stage-content card">';
  if(stage.isKaliSide){html+='<div class="notes-box mb-8">\ud83d\udda5\ufe0f Run these commands on your <strong>KALI</strong> attack machine, not the target.</div>';}
  // Commands
  if(stage.commands){
    stage.commands.forEach(function(c){
      html+='<div class="cmd-block"><button class="copy-btn" data-cmd="'+escAttr(c.cmd)+'">Copy</button>'+escHtml(c.cmd)+'</div>';
      if(c.why)html+='<div class="cmd-why">\u2139\ufe0f '+escHtml(c.why)+'</div>';
      if(c.verify)html+='<div class="cmd-verify">\u2705 '+escHtml(c.verify)+'</div>';
    });
  }
  // Form + output template
  if(stage.form&&stage.form.length>0){
    html+='<div class="form-row mt-12 flex-wrap">';
    stage.form.forEach(function(f){
      html+='<div class="form-group">';
      html+='<label>'+escHtml(f.label)+'</label>';
      if(f.type==='select'){
        html+='<select class="wizard-input" data-field="'+escAttr(f.id)+'">';
        (f.options||[]).forEach(function(o){html+='<option value="'+escAttr(o)+'">'+escHtml(o)+'</option>';});
        html+='</select>';
      } else {
        html+='<input type="text" class="wizard-input" data-field="'+escAttr(f.id)+'" placeholder="'+escAttr(f.placeholder||'')+'" value="'+escAttr(f.value||'')+'">';
      }
      html+='</div>';
    });
    html+='</div>';
    var formData=getWizardFormData();
    var output=stage.outputTemplate?stage.outputTemplate(formData):'';
    html+='<div class="output-block" id="wizardOutput"><button class="copy-btn" data-cmd="'+escAttr(output)+'" style="color:var(--text-secondary)">Copy All</button>'+escHtml(output)+'</div>';
  }
  if(stage.notes)html+='<div class="notes-box mt-12">\ud83d\udcdd '+escHtml(stage.notes)+'</div>';
  html+='</div>';
  // Nav buttons
  html+='<div class="flex gap-8 mt-12">';
  if(STATE.wizardStage>0)html+='<button class="btn wizard-prev-btn">\u2190 Previous Stage</button>';
  if(STATE.wizardStage<path.stages.length-1)html+='<button class="btn btn-accent wizard-next-btn">Next Stage \u2192</button>';
  html+='<button class="btn btn-sm wizard-complete-btn" style="margin-left:auto">\u2705 Mark Complete</button>';
  html+='<button class="btn btn-sm btn-danger wizard-fail-btn">\u274c Mark Failed</button>';
  html+='</div>';
  document.getElementById('wizardMain').innerHTML=html;
}

function getWizardFormData(){
  var data={};
  document.querySelectorAll('.wizard-input').forEach(function(el){data[el.dataset.field]=el.value;});
  return data;
}

function updateWizardOutput(){
  var path=WIZARD_PATHS[STATE.wizardPath];
  if(!path)return;
  var stage=path.stages[STATE.wizardStage];
  if(!stage||!stage.outputTemplate)return;
  var data=getWizardFormData();
  var output=stage.outputTemplate(data);
  var el=document.getElementById('wizardOutput');
  if(el){
    el.innerHTML='<button class="copy-btn" data-cmd="'+escAttr(output)+'" style="color:var(--text-secondary)">Copy All</button>'+escHtml(output);
  }
}

function initRabbitHoles(){
  var html='<h2 style="margin-bottom:4px">\ud83d\udeab Rabbit Hole Detector</h2><p class="text-sm text-muted mb-12">Paste any error message or describe what happened. Get instant diagnosis + what to do instead.</p>';
  html+='<div class="form-group"><textarea id="rabbitInput" rows="4" placeholder="Paste error message, describe symptom, or paste failed command output..."></textarea></div>';
  html+='<button class="btn btn-accent" id="rabbitCheckBtn">\ud83d\udd0d Check for Rabbit Hole</button>';
  html+='<div id="rabbitResults" class="mt-16"></div>';
  html+='<h3 class="mt-16 mb-8">All '+RABBIT_HOLES.length+' Known Rabbit Holes:</h3>';
  RABBIT_HOLES.forEach(function(rh){
    html+='<div class="card" style="padding:10px 14px"><div class="flex items-center gap-8 mb-8"><span class="badge badge-warn">'+escHtml(rh.id)+'</span><strong>'+escHtml(rh.title)+'</strong><span class="text-xs text-muted" style="margin-left:auto">\u23f1 Stop after '+escHtml(rh.stopAfter)+'</span></div>';
    html+='<div class="text-sm text-muted">'+escHtml(rh.explanation)+'</div>';
    html+='<div class="text-xs text-muted mt-8">Keywords: '+escHtml(rh.keywords.join(', '))+'</div></div>';
  });
  document.getElementById('pane-rabbitholes').innerHTML=html;
}

function runRabbitHoleCheck(input){
  if(!input.trim()){showToast('Enter an error message or symptom','error');return;}
  var lower=input.toLowerCase();
  var matches=[];
  RABBIT_HOLES.forEach(function(rh){
    var score=0;
    rh.keywords.forEach(function(kw){if(lower.indexOf(kw.toLowerCase())!==-1)score++;});
    if(score>0)matches.push({rh:rh,score:score});
  });
  matches.sort(function(a,b){return b.score-a.score;});
  var el=document.getElementById('rabbitResults');
  if(!matches.length){el.innerHTML='<div class="card"><p class="text-success">\u2705 No known rabbit hole pattern matched. This may be a legitimate issue worth investigating further.</p></div>';return;}
  var html='';
  matches.forEach(function(m){
    var rh=m.rh;
    html+='<div class="rh-result">';
    html+='<h3>\ud83d\udc07 '+escHtml(rh.id)+': '+escHtml(rh.title)+'</h3>';
    html+='<p class="text-sm mb-8">'+escHtml(rh.explanation)+'</p>';
    html+='<p class="text-sm text-warn mb-8">\u23f1 <strong>Stop after: '+escHtml(rh.stopAfter)+'</strong></p>';
    html+='<div class="text-sm" style="margin-bottom:6px"><strong>Try instead:</strong></div>';
    rh.alternatives.forEach(function(alt){
      html+='<div class="rh-alt">'+escHtml(alt)+'</div>';
    });
    html+='</div>';
  });
  el.innerHTML=html;
}

/* ══════════════════════════════════════════════════
   INITIALIZATION & EVENT DELEGATION
   ══════════════════════════════════════════════════ */
function init(){
  loadState();
  initQuickWins();
  initTriage();
  initWizardSidebar();
  initBuilder();
  initRabbitHoles();
  initReference();
  switchTab(STATE.activeTab);
  if(STATE.wizardPath)loadWizardPath(STATE.wizardPath);
  startTimer();
}

document.addEventListener('DOMContentLoaded',init);

document.body.addEventListener('click',function(e){
  var t=e.target;
  // Copy buttons
  if(t.classList.contains('copy-btn')){
    e.preventDefault();
    copyToClipboard(t.dataset.cmd||t.getAttribute('data-cmd'),t);
    return;
  }
  // Tab nav
  if(t.classList.contains('tab-btn')&&t.dataset.tab){switchTab(t.dataset.tab);return;}
  // Sidebar items
  if(t.closest('.sidebar-item')){var si=t.closest('.sidebar-item');if(si.dataset.path)loadWizardPath(si.dataset.path);return;}
  // Stage pills
  if(t.classList.contains('stage-pill')&&t.dataset.stage!==undefined){STATE.wizardStage=parseInt(t.dataset.stage);renderWizardStage();saveState();return;}
  // Wizard nav
  if(t.classList.contains('wizard-next-btn')){var p=WIZARD_PATHS[STATE.wizardPath];if(p&&STATE.wizardStage<p.stages.length-1){STATE.wizardStage++;renderWizardStage();saveState();}return;}
  if(t.classList.contains('wizard-prev-btn')){if(STATE.wizardStage>0){STATE.wizardStage--;renderWizardStage();saveState();}return;}
  if(t.classList.contains('wizard-complete-btn')){STATE.completedPaths.add(STATE.wizardPath);initWizardSidebar();saveState();showToast(STATE.wizardPath+' marked complete','success');return;}
  if(t.classList.contains('wizard-fail-btn')){STATE.failedPaths.add(STATE.wizardPath);initWizardSidebar();saveState();showToast(STATE.wizardPath+' marked failed','error');return;}
  // Quick win parse
  if(t.classList.contains('qw-parse-btn')){
    var rank=parseInt(t.dataset.rank);
    var ta=document.querySelector('.qw-output[data-rank="'+rank+'"]');
    runQuickWinParse(rank,ta?ta.value:'');
    return;
  }
  // Quick win wizard
  if(t.classList.contains('qw-wizard-btn')){switchTab('wizard');loadWizardPath(t.dataset.key);return;}
  // Triage analyze
  if(t.id==='triageAnalyzeBtn'){runTriage();return;}
  // Triage wizard buttons
  if(t.classList.contains('triage-wizard-btn')){switchTab('wizard');loadWizardPath(t.dataset.key);return;}
  // Builder cards
  if(t.closest('.builder-card')){var bc=t.closest('.builder-card');loadBuilder(bc.dataset.builder);return;}
  // Rabbit hole check
  if(t.id==='rabbitCheckBtn'){runRabbitHoleCheck(document.getElementById('rabbitInput').value);return;}
  // Reference toggle
  if(t.closest('.ref-header')){
    var rh=t.closest('.ref-header');var idx=rh.dataset.refToggle;
    var body=document.getElementById('ref-body-'+idx);
    if(body){body.classList.toggle('open');rh.classList.toggle('open');}
    return;
  }
  // Export
  if(t.id==='btnExport'){exportMarkdown();return;}
  // Reset
  if(t.id==='btnReset'){
    if(confirm('Reset all progress? This clears completed/failed paths and timer.')){
      localStorage.removeItem(CONFIG.storageKey);
      STATE.completedPaths=new Set();STATE.failedPaths=new Set();STATE.timerStart=Date.now();
      initWizardSidebar();saveState();showToast('Progress reset','info');
    }
    return;
  }
});

// Live input for wizard forms + builder
function handleLiveInput(e){
  if(e.target.classList.contains('wizard-input')){updateWizardOutput();}
  if(e.target.classList.contains('builder-input')){updateBuilderOutput();}
  if(e.target.id==='globalSearch'){globalSearch(e.target.value);}
  if(e.target.id==='wizardSearch'){
    var q=e.target.value.toLowerCase();
    document.querySelectorAll('.sidebar-item').forEach(function(el){el.style.display=el.textContent.toLowerCase().indexOf(q)!==-1?'':'none';});
  }
  if(e.target.id==='refSearch'){filterReference(e.target.value);}
}
document.body.addEventListener('input',handleLiveInput);
document.body.addEventListener('change',handleLiveInput);
</script>
</body>
